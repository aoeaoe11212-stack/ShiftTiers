<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiftPvP - Official Rankings Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="min-h-screen">

    <nav class="border-b border-white/5 sticky top-0 z-50 bg-[#0b0d13]/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <span class="text-2xl font-black tracking-wider text-[#00ff66]">SHIFT<span class="text-white">PVP</span></span>
                <span class="text-[9px] font-mono border border-white/10 text-gray-400 px-2 py-0.5 rounded tracking-widest uppercase bg-white/5">Tier Matrix</span>
            </div>
            
            <div class="w-full md:w-80 relative">
                <input type="text" id="search-player" placeholder="FILTER BY USERNAME..." class="w-full uppercase font-mono tracking-wider text-xs">
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 mt-10">
        <div class="crypto-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[850px]">
                    <thead>
                        <tr>
                            <th class="py-4 px-5 text-center w-16">Rank</th>
                            <th class="py-4 px-5">Username</th>
                            <th class="py-4 px-2 text-center">Nethpot</th>
                            <th class="py-4 px-2 text-center">Crystal</th>
                            <th class="py-4 px-2 text-center">UHC</th>
                            <th class="py-4 px-2 text-center">SMP</th>
                            <th class="py-4 px-2 text-center">Sword</th>
                            <th class="py-4 px-2 text-center">DSMP</th>
                            <th class="py-4 px-2 text-center">Mace</th> <th class="py-4 px-6 text-right w-28">Global Pts</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="rankings-tbody">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="text-center py-12 text-gray-600 text-xs font-mono tracking-wide">
        <p>&copy; 2026 SHIFTPVP PROTOCOL INTERFACE. ALL RIGHTS REGULATED.</p>
    </footer>

    <script src="assets/js/app.js"></script>
</body>
</html>
