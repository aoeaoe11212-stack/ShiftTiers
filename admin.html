<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiftPvP Admin Live Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="min-h-screen pb-12">

    <nav class="border-b border-white/5 sticky top-0 z-50 bg-[#0b0d13]/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-xl font-black tracking-wider text-[#00ff66]">SHIFT<span class="text-white">PVP</span></span>
                <span class="text-[10px] font-mono border border-[#00ff66]/30 text-[#00ff66] px-2 py-0.5 rounded uppercase tracking-widest bg-[#00ff66]/5">Live Sync Panel</span>
            </div>
            <a href="index.html" class="text-xs font-medium text-gray-400 hover:text-white border border-white/10 hover:border-white/20 px-4 py-2 rounded-lg transition bg-white/5">View Leaderboard</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 mt-8 space-y-6">

        <div class="crypto-card p-6">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest font-mono mb-4">// System Integration Config</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-[11px] font-semibold text-gray-500 uppercase font-mono">GitHub Owner</label>
                    <input type="text" id="cfg-username" placeholder="GitHub username">
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-[11px] font-semibold text-gray-500 uppercase font-mono">Repository Name</label>
                    <input type="text" id="cfg-repo" placeholder="minecraft-pvp-tiers">
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-[11px] font-semibold text-gray-500 uppercase font-mono">Developer Token (Classic)</label>
                    <input type="password" id="cfg-token" placeholder="ghp_xxxxxxxxxxxxxx">
                </div>
            </div>
            <div class="mt-4 flex justify-end">
                <button onclick="saveConfiguration()" class="text-xs px-5 py-2.5 rounded-lg font-bold cursor-pointer transition">Connect Codebase Pipeline</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
            
            <div class="lg:col-span-1 crypto-card p-6 space-y-4">
                <h2 id="form-title" class="text-sm font-bold text-[#00ff66] uppercase tracking-widest font-mono">// Deploy New Entry</h2>
                
                <form id="player-form" class="space-y-4">
                    <input type="hidden" id="edit-index" value="-1">
                    
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold text-gray-400 uppercase font-mono">Player Username</label>
                        <input type="text" id="username" required placeholder="e.g., CaptainSparklez">
                    </div>

                    <div class="grid grid-cols-2 gap-3 pt-2 border-t border-white/5">
                        <div class="flex flex-col gap-1"><label class="text-[10px] font-bold text-gray-400 uppercase font-mono">Nethpot</label><select id="tier-nethpot"></select></div>
                        <div class="flex flex-col gap-1"><label class="text-[10px] font-bold text-gray-400 uppercase font-mono">Crystal</label><select id="tier-crystal"></select></div>
                        <div class="flex flex-col gap-1"><label class="text-[10px] font-bold text-gray-400 uppercase font-mono">UHC</label><select id="tier-uhc"></select></div>
                        <div class="flex flex-col gap-1"><label class="text-[10px] font-bold text-gray-400 uppercase font-mono">SMP</label><select id="tier-smp"></select></div>
                        <div class="flex flex-col gap-1"><label class="text-[10px] font-bold text-gray-400 uppercase font-mono">Sword</label><select id="tier-sword"></select></div>
                        <div class="flex flex-col gap-1"><label class="text-[10px] font-bold text-gray-400 uppercase font-mono">DSMP</label><select id="tier-dsmp"></select></div>
                        
                        <div class="flex flex-col gap-1 col-span-2"><label class="text-[10px] font-bold text-gray-400 uppercase font-mono">Mace Gamemode</label><select id="tier-mace"></select></div>
                    </div>

                    <div class="flex gap-2 pt-2">
                        <button type="submit" id="submit-btn" class="flex-1 text-xs py-2.5 cursor-pointer transition">Commit Profile Data</button>
                        <button type="button" id="cancel-btn" class="hidden border border-white/10 hover:border-white/20 bg-white/5 text-gray-300 font-bold text-xs py-2.5 rounded-lg px-4 cursor-pointer transition">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="lg:col-span-2 space-y-4">
                
                <div class="crypto-card p-4 flex flex-col sm:flex-row justify-between items-center gap-4 border-l-2 border-l-[#00ff66]!">
                    <div>
                        <h4 class="text-sm font-bold text-[#00ff66] font-mono">// Auto-Push Sync Engine</h4>
                        <p class="text-xs text-gray-400 mt-0.5">Push changes over GitHub production layers immediately.</p>
                    </div>
                    <button id="sync-btn" onclick="pushUpdatesToGitHub()" class="w-full sm:w-auto text-xs px-6 py-3 cursor-pointer transition">Update Live Site</button>
                </div>

                <div class="crypto-card overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[700px]">
                            <thead>
                                <tr>
                                    <th class="py-3 px-5">Player</th>
                                    <th class="py-3 px-1 text-center">Neth</th>
                                    <th class="py-3 px-1 text-center">Crys</th>
                                    <th class="py-3 px-1 text-center">UHC</th>
                                    <th class="py-3 px-1 text-center">SMP</th>
                                    <th class="py-3 px-1 text-center">Swrd</th>
                                    <th class="py-3 px-1 text-center">DSMP</th>
                                    <th class="py-3 px-1 text-center">Mace</th>
                                    <th class="py-3 px-5 text-right">Actions</th>
                                    <th></th> </tr>
                            </thead>
                            <tbody id="admin-table-tbody">
                                </tbody>
                        </table>
                    </div>
                </div>

            </div>

        </div>
    </main>

    <script src="assets/js/admin.js"></script>
</body>
</html>
