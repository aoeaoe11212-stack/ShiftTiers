<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Leaderboard - PvP Tiers</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-950 text-white font-sans antialiased min-h-screen">

    <nav class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center border-b border-gray-900">
        <a href="index.html" class="text-xl font-black tracking-wider text-amber-400">PVP TIERS</a>
        <div class="flex gap-4">
            <a href="index.html" class="text-gray-400 hover:text-white transition">Tier List</a>
            <a href="leaderboard.html" class="text-amber-400 font-bold border-b-2 border-amber-400 pb-1">Leaderboard</a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-12">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-amber-400 tracking-wide">GLOBAL LEADERBOARD</h1>
            <p class="text-gray-400 mt-2 text-sm">Akumulasi poin player dari semua kategori game mode</p>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden shadow-xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-950 text-gray-400 text-xs uppercase tracking-wider border-b border-gray-800">
                        <th class="py-4 px-6 text-center w-20">Rank</th>
                        <th class="py-4 px-6">Player</th>
                        <th class="py-4 px-6 text-center w-32">Total Poin</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-tbody" class="divide-y divide-gray-850">
                    </tbody>
            </table>
        </div>
    </main>

    <footer class="text-center py-8 text-gray-700 mt-12 border-t border-gray-900">
        <p>&copy; 2026 PvP Tier List. Powered by GitHub Pages.</p>
    </footer>

    <script src="assets/js/app.js"></script>
</body>
</html>
